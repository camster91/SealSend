# Supabase Configuration for Seal & Send
# https://supabase.com/docs/reference/cli/configuration

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://localhost:54321"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326
sender_name = "Seal & Send"

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://sealsend.ai"
additional_redirect_urls = [
  "https://sealsend.ai/**",
  "http://localhost:3000/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Email templates are configured in dashboard
# See: https://supabase.com/dashboard/project/vtbreowxqfcvwegpfnwn/auth/templates

[auth.email.template.magic_link]
subject = "Your Seal & Send Login Link"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.confirmation]
subject = "Confirm Your Email - Seal & Send"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset Your Password - Seal & Send"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "Confirm Email Change - Seal & Send"
content_path = "./supabase/templates/email_change.html"

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = true
port = 54337
vector_port = 54338
backend = "postgres"

# Experimental features
[experimental]
orioledb_version = ""

[experimental.webhooks]
enabled = true